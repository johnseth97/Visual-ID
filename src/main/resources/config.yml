# Command keyword. Change this if another plugin already uses /visual-id.
# Requires a server restart to take effect.
command: visual-id

enabled-by-default: true
update-interval-ticks: 5
max-distance: 8.0
prefer-entities: true

show:
  material-name: true
  namespaced-key: true
  coordinates: true
  biome: false
  light-level: false
  entity-health: true
