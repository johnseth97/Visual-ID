name: Info
version: 1.0.0
main: com.johnseth97.info.InfoPlugin
api-version: '1.21'
author: johnseth97
description: Lightweight server-side block/entity info HUD for Paper.

# Commands are registered dynamically from config.yml (command: <name>).
# No static command block here — that lets admins remap the keyword freely.

permissions:
  info.use:
    description: Allows receiving the Info HUD.
    default: true
  info.toggle:
    description: Allows toggling the Info HUD on/off.
    default: true
  info.reload:
    description: Allows reloading config and toggling display sections.
    default: op
