name: VisualID
version: 1.0.1
main: com.johnseth97.visualid.VisualIdPlugin
api-version: '1.21'
author: johnseth97
description: Lightweight server-side Visual Identification HUD for Paper.

# "visual-id" is the built-in keyword registered here for proper Brigadier integration.
# To use a different keyword, set command: <name> in config.yml — that alias is
# registered dynamically on top of this one.
commands:
  visual-id:
    description: Visual Identification HUD.
    usage: /visual-id [toggle|status|reload|config]
    permission: visualid.use

permissions:
  visualid.use:
    description: Allows receiving the Visual ID HUD.
    default: true
  visualid.toggle:
    description: Allows toggling the Visual ID HUD on/off.
    default: true
  visualid.reload:
    description: Allows reloading config and toggling display sections.
    default: op
